---
# Install Docker, start Jenkins container, and install cluster tools on the Jenkins EC2.
#
# Prerequisites:
#   - terraform apply has completed (Jenkins EC2 is running)
#   - SSH key pair .pem file is available locally
#
# Run (replaces static inventory with the live Terraform output):
#
#   JENKINS_IP=$(cd terraform && terraform output -raw jenkins_public_ip)
#   ansible-playbook ansible/playbooks/configure-jenkins.yaml \
#     -i "${JENKINS_IP}," \
#     --user ec2-user \
#     --private-key ~/.ssh/YOUR_KEY_PAIR.pem
#
# Or after adding host to ansible/inventory.ini [jenkins] group:
#   ansible-playbook ansible/playbooks/configure-jenkins.yaml \
#     -i ansible/inventory.ini --limit jenkins \
#     --user ec2-user --private-key ~/.ssh/YOUR_KEY_PAIR.pem

- name: Configure Jenkins EC2
  hosts: all
  become: true
  gather_facts: true

  vars:
    jenkins_home:       /var/jenkins_home
    jenkins_version:    lts
    kubectl_version:    "v1.34.1"
    terraform_version:  "1.14.0"

  tasks:

    # ── Docker ────────────────────────────────────────────────────────────────
    - name: Install Docker
      dnf:
        name: docker
        state: present
        update_cache: true

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    # ── Jenkins container ─────────────────────────────────────────────────────
    - name: Create Jenkins home directory with correct ownership
      file:
        path: "{{ jenkins_home }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"

    - name: Start Jenkins container (idempotent)
      command: >
        docker run -d
          --name jenkins
          --restart unless-stopped
          -p 8080:8080
          -p 50000:50000
          -v {{ jenkins_home }}:/var/jenkins_home
          -v /var/run/docker.sock:/var/run/docker.sock
          -e JAVA_OPTS="-Xmx2g"
          jenkins/jenkins:{{ jenkins_version }}
      register: jenkins_run
      failed_when:
        - jenkins_run.rc != 0
        - "'already in use' not in jenkins_run.stderr"
      changed_when: jenkins_run.rc == 0

    - name: Wait for Jenkins to start
      wait_for:
        port: 8080
        timeout: 120

    # ── kubectl on Jenkins host ───────────────────────────────────────────────
    - name: Download kubectl binary
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"
        force: false

    # ── AWS CLI on Jenkins host ───────────────────────────────────────────────
    - name: Install pip3
      dnf:
        name: python3-pip
        state: present

    - name: Install awscli via pip3
      pip:
        name: awscli
        executable: pip3
        state: present

    # ── Terraform + kubectl + Ansible inside Jenkins container (CD pipeline) ─
    # Jenkinsfile.cd runs terraform / kubectl / ansible-playbook in the agent (this container).
    - name: Install unzip (required to extract Terraform zip)
      dnf:
        name: unzip
        state: present

    - name: Download Terraform binary bundle
      get_url:
        url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip"
        dest: "/tmp/terraform_{{ terraform_version }}_linux_amd64.zip"
        mode: "0644"

    - name: Extract Terraform to /usr/local/bin on host
      unarchive:
        src: "/tmp/terraform_{{ terraform_version }}_linux_amd64.zip"
        dest: /usr/local/bin
        remote_src: true
        creates: /usr/local/bin/terraform

    - name: Ensure terraform binary is executable on host
      file:
        path: /usr/local/bin/terraform
        mode: "0755"

    - name: Copy Terraform into Jenkins container
      command: docker cp /usr/local/bin/terraform jenkins:/usr/local/bin/terraform

    - name: Copy kubectl into Jenkins container
      command: docker cp /usr/local/bin/kubectl jenkins:/usr/local/bin/kubectl

    - name: Ensure pip3 exists in Jenkins container (Debian-based jenkins/jenkins image)
      shell: |
        docker exec -u root jenkins bash -lc '
          if ! command -v pip3 >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y --no-install-recommends python3-pip
          fi
        '
      changed_when: true

    - name: Install Ansible in Jenkins container (for ansible-playbook in CD)
      shell: |
        docker exec -u root jenkins bash -lc '
          pip3 install --no-cache-dir ansible awscli 2>/dev/null || \
          pip3 install --no-cache-dir --break-system-packages ansible awscli 2>/dev/null || \
          pip3 install --no-cache-dir ansible awscli
        '
      changed_when: true

    # ── Summary ───────────────────────────────────────────────────────────────
    - name: Copy Docker CLI binary into Jenkins container
      command: docker cp /usr/bin/docker jenkins:/usr/local/bin/docker

    - name: Add jenkins user to docker group inside container (matching host GID)
      shell: |
        DOCKER_GID=$(stat -c %g /var/run/docker.sock)
        docker exec -u root jenkins bash -c "
          groupadd -f -g ${DOCKER_GID} docker 2>/dev/null || true
          usermod -aG docker jenkins
        "
      changed_when: true

    - name: Verify CD tools inside Jenkins container
      shell: |
        docker exec jenkins bash -lc 'terraform version && kubectl version --client && ansible-playbook --version | head -1'
      register: cd_tools_verify
      changed_when: false

    - name: Show CD tools versions
      debug:
        msg: "{{ cd_tools_verify.stdout_lines }}"

    - name: Print Jenkins initial admin password location
      debug:
        msg:
          - "Jenkins is running at http://{{ ansible_host }}:8080"
          - "Retrieve initial admin password:"
          - "  ssh ec2-user@{{ ansible_host }} 'sudo docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword'"
